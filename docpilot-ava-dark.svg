  <rect x="40" y="450" width="1000" height="310" rx="16" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="1060" y="450" width="500" height="310" rx="16" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <rect x="70" y="485" width="940" height="210" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="92" y="514" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Conversa</text>

