  <rect x="530" y="220" width="440" height="110" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="552" y="255" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Cliente Y • Portal Web</text>
  <text x="552" y="278" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Fonte: Notion • 54 páginas</text>
  <rect x="552" y="292" width="140" height="24" rx="9" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B" stroke-opacity="0.60"/>
  <text x="566" y="309" fill="#FDE68A" font-family="Inter, Arial" font-size="10.5" font-weight="950">ATUALIZAR</text>
  <rect x="850" y="266" width="100" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="900" y="286" text-anchor="middle" dominant-baseline="middle"
        fill="#FFFFFF" font-family="Inter, Arial" font-size="12" font-weight="900">Abrir</text>

