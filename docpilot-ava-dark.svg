<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 1600 1080"
     preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1600" height="1080" fill="#0B0D10"/>

  <!-- Topbar -->
  <rect x="40" y="28" width="1520" height="76" rx="16" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="72" y="74" fill="#FFFFFF" font-family="Inter, Arial" font-size="18" font-weight="900">DocPilot</text>
  <rect x="160" y="56" width="8" height="20" rx="4" fill="#FF5800"/>

  <!-- Project selector -->
  <rect x="210" y="48" width="420" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="230" y="74" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Projeto: Cliente X • Billing API</text>

  <!-- Status badge -->
  <rect x="640" y="52" width="108" height="32" rx="10" fill="#10B981" fill-opacity="0.16" stroke="#10B981" stroke-opacity="0.55"/>
  <text x="662" y="74" fill="#A7F3D0" font-family="Inter, Arial" font-size="10.5" font-weight="950">INDEXADO</text>

