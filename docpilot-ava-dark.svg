  <rect x="868" y="48" width="74" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="905" y="68" text-anchor="middle" dominant-baseline="middle"
        fill="#FFFFFF" fill-opacity="0.78" font-family="Inter, Arial" font-size="11" font-weight="950">Chat</text>

  <rect x="950" y="48" width="110" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="1005" y="68" text-anchor="middle" dominant-baseline="middle"
        fill="#FFFFFF" fill-opacity="0.78" font-family="Inter, Arial" font-size="11" font-weight="950">Gerar Docs</text>

  <rect x="1068" y="48" width="84" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="1110" y="68" text-anchor="middle" dominant-baseline="middle"
        fill="#FFFFFF" fill-opacity="0.78" font-family="Inter, Arial" font-size="11" font-weight="950">Fontes</text>

