  <rect x="92" y="600" width="898" height="74" rx="14" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="112" y="630" fill="#FFFFFF" font-family="Inter, Arial" font-size="12.5" font-weight="650">Passos: Node 18+ • configurar .env • npm i • npm run dev</text>
  <rect x="112" y="640" width="150" height="24" rx="9" fill="#3B82F6" fill-opacity="0.16" stroke="#3B82F6" stroke-opacity="0.55"/>
  <text x="124" y="657" fill="#BFDBFE" font-family="Inter, Arial" font-size="10.5" font-weight="950">COM FONTES</text>

