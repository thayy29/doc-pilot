  <text x="1090" y="485" fill="#FFFFFF" font-family="Inter, Arial" font-size="15" font-weight="900">Fontes</text>
  <text x="1090" y="508" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Links do conteúdo usado na resposta.</text>

  <rect x="1090" y="528" width="440" height="64" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="1112" y="556" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Runbook • Setup Local</text>
  <text x="1112" y="576" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Confluence /page/123</text>

  <rect x="1090" y="602" width="440" height="64" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="1112" y="630" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Env Vars</text>
  <text x="1112" y="650" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Confluence /page/456</text>

  <rect x="1090" y="676" width="440" height="64" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="1112" y="704" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Troubleshooting</text>
  <text x="1112" y="724" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Confluence /page/789</text>

  <!-- SECTION: Gerar Docs -->
