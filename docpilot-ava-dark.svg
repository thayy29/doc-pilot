  <text x="40" y="844" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Gere um rascunho, revise e exporte.</text>
  <rect x="40" y="860" width="1520" height="170" rx="16" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <rect x="70" y="892" width="360" height="110" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="92" y="926" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Runbook</text>
  <text x="92" y="948" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Como rodar + env vars + troubleshooting</text>
  <rect x="92" y="960" width="100" height="36" rx="12" fill="#FF5800"/>
  <text x="142" y="978" text-anchor="middle" dominant-baseline="middle"
        fill="#111418" font-family="Inter, Arial" font-size="12" font-weight="950">Gerar</text>

  <rect x="450" y="892" width="360" height="110" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="472" y="926" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Arquitetura</text>
  <text x="472" y="948" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Componentes + integrações + visão geral</text>
  <rect x="472" y="960" width="100" height="36" rx="12" fill="#FF5800"/>
  <text x="522" y="978" text-anchor="middle" dominant-baseline="middle"
        fill="#111418" font-family="Inter, Arial" font-size="12" font-weight="950">Gerar</text>

  <rect x="830" y="892" width="700" height="110" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="852" y="926" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Editor</text>
  <text x="852" y="948" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">O texto gerado aparece aqui para revisão.</text>
  <rect x="852" y="962" width="460" height="36" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="874" y="986" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650"># Runbook (rascunho)…</text>

  <rect x="1322" y="962" width="96" height="36" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="1370" y="980" text-anchor="middle" dominant-baseline="middle"
        fill="#FFFFFF" font-family="Inter, Arial" font-size="12" font-weight="900">Exportar</text>

  <rect x="1426" y="962" width="104" height="36" rx="12" fill="#FF5800"/>
  <text x="1478" y="980" text-anchor="middle" dominant-baseline="middle"
        fill="#111418" font-family="Inter, Arial" font-size="12" font-weight="950">Salvar</text>
</svg>