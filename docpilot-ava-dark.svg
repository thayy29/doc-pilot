  <text x="40" y="174" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Escolha o projeto e gerencie importações.</text>
  <rect x="40" y="190" width="1520" height="170" rx="16" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <!-- Card 1 -->
  <rect x="70" y="220" width="440" height="110" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="92" y="255" fill="#FFFFFF" font-family="Inter, Arial" font-size="13" font-weight="900">Cliente X • Billing API</text>
  <text x="92" y="278" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Fonte: Confluence • 128 páginas</text>
  <rect x="92" y="292" width="86" height="24" rx="9" fill="#10B981" fill-opacity="0.16" stroke="#10B981" stroke-opacity="0.55"/>
  <text x="108" y="309" fill="#A7F3D0" font-family="Inter, Arial" font-size="10.5" font-weight="950">INDEXADO</text>
  <rect x="390" y="266" width="100" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="440" y="286" text-anchor="middle" dominant-baseline="middle"
