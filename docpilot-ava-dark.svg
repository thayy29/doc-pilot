  <rect x="70" y="710" width="780" height="40" rx="12" fill="#111418" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="92" y="736" fill="#FFFFFF" fill-opacity="0.72" font-family="Inter, Arial" font-size="11" font-weight="650">Pergunte algo…</text>
  <rect x="860" y="710" width="150" height="40" rx="12" fill="#FF5800"/>
  <text x="935" y="730" text-anchor="middle" dominant-baseline="middle"
        fill="#111418" font-family="Inter, Arial" font-size="12" font-weight="950">Enviar</text>

