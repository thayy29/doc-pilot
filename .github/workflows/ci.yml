name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: web

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Typecheck + Lint + Test
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Build (só roda se tests passarem)
  # ────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          # Variáveis dummy para o build não falhar por falta de env
          DATABASE_URL: postgresql://user:pass@localhost:5432/docpilot
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret-placeholder
